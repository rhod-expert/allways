server {
    listen 80;
    listen 443 ssl;
    server_name 192.168.1.225 yaguaretex.sanjosesa.com.py;

    # SSL Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/yaguaretex.sanjosesa.com.py/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yaguaretex.sanjosesa.com.py/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Corrigir redirect para manter a porta original do request
    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # CSP frame-ancestors — permitir iframe desde sanjosesa.com.py (com e sem www)
    # Nota: X-Frame-Options ALLOW-FROM é deprecado e ignorado por Chrome/Edge.
    # Definimos como variável para reutilizar nos location blocks (nginx herança de add_header).
    set $csp_frame "frame-ancestors 'self' https://www.sanjosesa.com.py https://sanjosesa.com.py";

    # Frontend (SPA)
    location /allways {
        alias /var/www/html/allways/frontend/dist;
        try_files $uri $uri/ /allways/index.html;

        # No cache for HTML (SPA entry point)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Content-Security-Policy $csp_frame always;

        # Cache static assets (JS/CSS have hash in filename)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Content-Security-Policy $csp_frame always;
        }
    }

    # API Backend
    location /allways/api {
        proxy_pass http://127.0.0.1:3001/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 10M;
    }

    # Block direct access to uploads
    location /allways/uploads {
        deny all;
    }
}
